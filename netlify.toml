# Netlify deploy configuration for the Coffee Brewing Calculator (Vite SPA).

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  # Server-side Notion sync proxy (holds NOTION_TOKEN; never bundled to client).
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  # `netlify dev` runs Vite (targetPort) and serves the app + functions on `port`.
  # Use this (not plain `vite`) so the Logbook's functions work locally.
  framework = "#custom"
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[build.environment]
  # Pin a stable LTS for reproducible builds (Vite 6 needs Node 18+).
  NODE_VERSION = "20"

# Single-page app fallback: serve index.html for any path so client-side
# routing/deep links resolve. Harmless for the current single-view app and
# ready if routes are added later.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
